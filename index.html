/* =============================================
   DESIGN TOKENS
============================================= */
:root {
  --bg:         #F1F4EE;
  --surface:    #FFFFFF;
  --primary:    #6B9080;
  --primary-lt: #E0EBDF;
  --primary-dk: #486058;
  --primary-gd: linear-gradient(135deg,#7BA890,#5E8473);
  --sage:       #6B9080;
  --sage-lt:    #DCEFE2;
  --tan:        #B5C7B0;
  --text:       #1F2A26;
  --text-2:     #4F5E58;
  --text-3:     #92A39B;
  --border:     #DCE5DD;
  --border-lt:  #ECF1EC;
  --danger:     #B5564E;
  --danger-lt:  #F5E1DE;
  --warn:       #B89A5A;
  --warn-lt:    #F4ECD7;
  --ok:         #5A9170;
  --ok-lt:      #DCEEDF;
  --r:          18px;
  --r-sm:       11px;
  --shadow:     0 1px 4px rgba(31,42,38,.05), 0 4px 16px rgba(31,42,38,.06);
  --shadow-md:  0 2px 8px rgba(31,42,38,.07), 0 8px 24px rgba(31,42,38,.09);
  --shadow-lg:  0 8px 32px rgba(31,42,38,.13), 0 2px 8px rgba(31,42,38,.06);
  --sidebar-w:  252px;
  --nav-h:      72px;
}

/* =============================================
   RESET & BASE
============================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }
body { font-family: -apple-system,'SF Pro Display','SF Pro Text',system-ui,sans-serif; background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; letter-spacing:-.01em; }
button { font-family:inherit; cursor:pointer; border:none; background:none; }
input, textarea, select { font-family:inherit; font-size:16px; border:none; outline:none; background:none; width:100%; color:var(--text); }
textarea { resize:none; }
img { display:block; }

/* =============================================
   LAYOUT — MOBILE (default)
============================================= */
#app { height:100vh; display:flex; flex-direction:column; overflow:hidden; }

.screen {
  flex:1; overflow-y:auto; overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--nav-h) + 24px);
}

/* Bottom nav — mobile */
.nav {
  height:var(--nav-h);
  padding-bottom:env(safe-area-inset-bottom,0px);
  background:rgba(255,255,255,.92);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-top:1px solid var(--border-lt);
  display:flex; align-items:center; justify-content:space-around;
  flex-shrink:0; position:relative; z-index:10;
}
.nav-btn {
  flex:1; display:flex; flex-direction:column; align-items:center;
  gap:3px; padding:8px 4px;
  color:var(--text-3); font-size:10px; font-weight:600; letter-spacing:.2px;
  transition:color .2s;
}
.nav-btn.active { color:var(--primary); }

  display:flex; align-items:center; justify-content:center;

.fab:active { transform:scale(.93); box-shadow:0 2px 8px rgba(184,97,74,.3); }

/* Sheet — mobile: slides up from bottom */
.backdrop {
  position:fixed; inset:0; background:rgba(0,0,0,.32);
  backdrop-filter:blur(4px); -webkit-backdrop-filter:blur(4px);
  z-index:200; display:flex; align-items:flex-end;
  animation:fadeIn .2s;
}
.sheet {
  width:100%; max-height:92vh; overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  background:var(--surface); border-radius:26px 26px 0 0;
  padding:8px 20px 48px; animation:slideUp .28s cubic-bezier(.32,.72,0,1);
  box-shadow:0 -4px 32px rgba(34,24,16,.12);
}
.sheet-handle {
  width:36px; height:4px; background:var(--border);
  border-radius:2px; margin:0 auto 20px;
}

/* =============================================
   LAYOUT — DESKTOP (≥ 768px)
============================================= */
@media (min-width:768px) {

    flex-direction:row;
  }

  /* Sidebar */

    width:var(--sidebar-w); height:100vh;
    flex-direction:column; justify-content:flex-start; align-items:stretch;
    border-top:none; border-right:1px solid var(--border-lt);
    background:var(--surface);
    padding:0 0 24px; flex-shrink:0;
    overflow:hidden;
  }
  .nav-logo {
    display:flex; align-items:center; gap:12px;
    padding:28px 20px 22px;
    border-bottom:1px solid var(--border-lt); margin-bottom:8px;
    flex-shrink:0;
  }
  .nav-logo-icon {
    width:40px; height:40px; border-radius:14px;
    background:var(--primary-gd);
    display:flex; align-items:center; justify-content:center;
    font-size:20px; flex-shrink:0;
    box-shadow:0 2px 8px rgba(184,97,74,.28);

  .nav-logo-text { font-size:21px; font-weight:800; color:var(--text); letter-spacing:-.04em; }
  .nav-logo-sub  { font-size:11px; color:var(--text-3); margin-top:1px; font-weight:500; }

  .nav-btn {
    flex:none; flex-direction:row; align-items:center;
    gap:11px; padding:10px 14px;
    font-size:14px; font-weight:600; letter-spacing:-.01em;
    border-radius:12px; margin:1px 10px;
    text-align:left; justify-content:flex-start;
    transition:background .15s, color .15s;
  }
  .nav-btn.active {
    background:var(--primary-lt); color:var(--primary);
  }
  .nav-btn:not(.active):hover { background:var(--bg); }

  .nav-footer {
    margin-top:auto; padding:14px 20px 0;
    border-top:1px solid var(--border-lt);
    font-size:11px; color:var(--text-3); line-height:1.7; font-weight:500;
  }

  /* Main content */
  .screen {
    flex:1; padding-bottom:32px;
    height:100vh; overflow-y:auto;
  }

  /* Sheet — desktop: centered dialog */
  .backdrop { align-items:center; justify-content:center; }
  .sheet {
    width:100%; max-width:580px; border-radius:20px;
    max-height:88vh; animation:fadeIn .2s;
    padding:8px 28px 40px;
  }
  .sheet-handle { display:none; }

  /* FAB */
  .fab { bottom:32px; right:32px; }

  /* Product grid: 3 cols */
  .product-grid { grid-template-columns:repeat(3,1fr); }

  /* Page headers bigger on desktop */
  .page-title { font-size:32px; }
}

@media (min-width:1100px) {
  .product-grid { grid-template-columns:repeat(4,1fr); }
}

/* Search */

.product-card { background:var(--surface); border-radius:var(--r); overflow:hidden; box-shadow:var(--shadow); cursor:pointer; transition:transform .2s cubic-bezier(.34,1.56,.64,1), box-shadow .2s; border:1px solid var(--border-lt); }

.product-info { padding:7px 9px 10px; }
.product-name { font-size:11px; font-weight:700; line-height:1.3; }
.product-brand { font-size:10px; color:var(--text-3); margin-top:1px; font-weight:500; }
@media (min-width:768px) {
  .product-photo { font-size:40px; }
  .product-info { padding:10px 12px 13px; }
  .product-name { font-size:13px; }

}

/* Photo upload area */
.photo-add { width:100%; height:160px; border-radius:12px; background:var(--bg); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; color:var(--text-3); font-size:13px; gap:8px; margin-bottom:16px; overflow:hidden; position:relative; border:2px dashed var(--border); transition:border-color .2s; }

/* Page header */

/* Progress bar */
.progress-wrap { height:6px; background:var(--bg); border-radius:3px; overflow:hidden; margin-top:8px; }
.progress-bar { height:100%; border-radius:3px; background:var(--primary); transition:width .3s; }

/* Routine card */
.routine-card { background:var(--surface); border-radius:var(--r); padding:20px; box-shadow:var(--shadow); margin-bottom:12px; border:1px solid var(--border-lt); }

/* Reaction chips */
.reaction-chips { display:flex; flex-wrap:wrap; gap:6px; }
.reaction-chip { padding:6px 12px; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; }
.reaction-chip.sel { background:var(--primary); color:#fff; }
.reaction-chip.unsel { background:var(--bg); color:var(--text-2); }
.reaction-chip.unsel:hover { background:var(--primary-lt); }

/* Date nav */
.date-nav { display:flex; align-items:center; justify-content:center; gap:20px; padding:4px 16px 14px; }
.date-arrow { font-size:28px; color:var(--text-2); padding:4px 12px; line-height:1; border-radius:8px; transition:background .15s; }
.date-arrow:hover:not(:disabled) { background:var(--border); }
.date-arrow:disabled { color:var(--border); }
.date-label { font-weight:700; font-size:17px; min-width:140px; text-align:center; }

/* Bar chart */
.bar-chart { display:flex; align-items:flex-end; gap:3px; height:90px; }
.bar-col { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; }
.bar { border-radius:4px 4px 0 0; width:100%; min-height:4px; transition:height .3s; }
.bar-lbl { font-size:8px; color:var(--text-3); }

/* Empty state */
.empty { text-align:center; padding:60px 20px; }
.empty-icon { font-size:56px; margin-bottom:14px; }
.empty-title { font-size:18px; font-weight:700; margin-bottom:8px; }
.empty-text { font-size:14px; color:var(--text-3); line-height:1.55; }

/* Desktop-only two-col routine */
@media (min-width:768px) {
  .routine-cols { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
}

/* Desktop home grid */
@media (min-width:768px) {
  .home-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
  .home-grid-full { grid-column:1/-1; }
}

@keyframes fadeIn  { from{opacity:0}   to{opacity:1} }
@keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }

const TESTER_NAME   = '';
const EXPIRY_DATE   = '';
const TESTER_ID     = '';

function checkExpiry() {
  if (!EXPIRY_DATE) return null;
  const exp = new Date(EXPIRY_DATE);
  const diff = Math.ceil((exp - new Date()) / (1000 * 60 * 60 * 24));
  if (diff < 0) return 'expired';
  if (diff <= 3) return 'soon';
  return null;
}

const STORAGE_OK = (()=>{ try{ localStorage.setItem('_t','1'); localStorage.removeItem('_t'); return true; }catch{ return false; }})();

      ⚠️ <strong>Данные не сохраняются!</strong> Открой приложение через HTTPS-ссылку (GitHub Pages или Netlify), а не как локальный файл.

const uid   = () => Math.random().toString(36).slice(2);
const today = () => new Date().toISOString().slice(0,10);

function addDays(iso, n) {
  const d = new Date(iso + 'T12:00:00'); d.setDate(d.getDate()+n);
  return d.toISOString().slice(0,10);
}

function getDaysLeft(p) {
  let exp = null;
  if ((p.trackExpiry==='general'||p.trackExpiry==='both') && p.expiryDate) exp = new Date(p.expiryDate);
  if ((p.trackExpiry==='pao'||p.trackExpiry==='both') && p.openedDate && p.paoMonths) {
    const d = new Date(p.openedDate); d.setMonth(d.getMonth()+parseInt(p.paoMonths,10));
    exp = exp ? (d<exp?d:exp) : d;
  }
  if (!exp) return null;
  return Math.ceil((exp-new Date())/86400000);
}

function expiryStatus(days) {
  if (days===null)  return null;
  if (days<0)       return 'danger';
  if (days<=7)      return 'danger';
  if (days<=30)     return 'warn';
  return 'ok';
}

function typeIcon(id) { return PRODUCT_TYPES.find(t=>t.id===id)?.icon||'🧴'; }

function checkConflicts(products) {
  const results=[];
  for (let i=0;i<products.length;i++) {
    for (let j=i+1;j<products.length;j++) {
      const ingA=(products[i].ingredients||'').toLowerCase();
      const ingB=(products[j].ingredients||'').toLowerCase();
      if (!ingA||!ingB) continue;
      for (const c of CONFLICTS) {
        const aInA=c.a.some(k=>ingA.includes(k)), bInB=c.b.some(k=>ingB.includes(k));
        const aInB=c.a.some(k=>ingB.includes(k)), bInA=c.b.some(k=>ingA.includes(k));
        if ((aInA&&bInB)||(aInB&&bInA)) {
          if (!results.find(r=>r.title===c.title)) results.push({...c,pair:[products[i].name,products[j].name]});
        }
      }
    }
  }
  return results;
}

function selfConflicts(ing) {
  if (!ing) return [];
  const t=ing.toLowerCase();
  return CONFLICTS.filter(c=>c.a.some(k=>t.includes(k))&&c.b.some(k=>t.includes(k)));
}

function checkSynergies(products) {
  const results=[];
  const seen=new Set();
  for (let i=0;i<products.length;i++) {
    for (let j=i+1;j<products.length;j++) {
      const ingA=(products[i].ingredients||'').toLowerCase();
      const ingB=(products[j].ingredients||'').toLowerCase();
      if (!ingA||!ingB) continue;
      for (const s of SYNERGIES) {
        const aInA=s.a.some(k=>ingA.includes(k)), bInB=s.b.some(k=>ingB.includes(k));
        const aInB=s.a.some(k=>ingB.includes(k)), bInA=s.b.some(k=>ingA.includes(k));
        if ((aInA&&bInB)||(aInB&&bInA)) {
          const key=s.title+'|'+products[i].id+'|'+products[j].id;
          if (!seen.has(key)) {
            seen.add(key);
            results.push({...s, pair:[products[i].name, products[j].name]});
          }
        }
      }
    }
  }
  return results;
}

// Анализ продуктов по проблемам кожи
function analyzeForConcerns(products, concerns) {
  const results = {};
  for (const concern of concerns) {
    const matched = [];
    for (const p of products.filter(pr=>pr.category==='current' && !PRODUCT_TYPES.find(t=>t.id===pr.type)?.isGadget)) {
      const ing = (p.ingredients||'').toLowerCase();
      if (!ing) continue;
      const actions = INGREDIENT_ACTIONS
        .filter(a=>a.concerns.includes(concern) && a.key.split(' ').every(w=>ing.includes(w.split('').join(''))) || ing.includes(a.key))
        .filter(a=>a.concerns.includes(concern));
      if (actions.length>0) {
        matched.push({ product:p, actions });
      }
    }
    results[concern] = matched;
  }
  return results;
}

// Корреляции: средство → изменение рейтинга кожи на следующий день
function computeCorrelations(products, logs) {
  const entries = Object.entries(logs).sort(([a],[b])=>a.localeCompare(b));
  const res = [];
  const cosmetics = products.filter(p=>p.category==='current' && !PRODUCT_TYPES.find(t=>t.id===p.type)?.isGadget);
  for (const p of cosmetics) {
    let delta=0, cnt=0, improvements=0, negatives=0;
    for (let i=0;i<entries.length-1;i++) {
      const [,log]=entries[i];
      const [,nxt]=entries[i+1];
      const used=[...(log.morning||[]),...(log.evening||[])].includes(p.id);
      if (used && log.skinRating && nxt.skinRating) {
        delta+=nxt.skinRating-log.skinRating;
        cnt++;
        if(nxt.skinRating>log.skinRating) improvements++;
        if(nxt.skinRating<log.skinRating) negatives++;
      }
    }
    // Считаем total uses
    const uses = Object.values(logs).filter(l=>[...(l.morning||[]),...(l.evening||[])].includes(p.id)).length;
    if (cnt>=2) res.push({ product:p, avgDelta:delta/cnt, cnt, improvements, negatives, uses });
  }
  return res.sort((a,b)=>b.avgDelta-a.avgDelta);
}

// Экспорт дневника в CSV
function exportDiaryCSV(logs, products) {
  const headers=['Дата','Утро','Вечер','Гаджеты','Рейтинг кожи','Реакции','Заметки'];
  const getName=id=>products.find(p=>p.id===id)?.name||id;
  const rows=Object.entries(logs).sort(([a],[b])=>a.localeCompare(b)).map(([date,log])=>[
    date,
    `"${(log.morning||[]).map(getName).join('; ')}"`,
    `"${(log.evening||[]).map(getName).join('; ')}"`,
    `"${(log.gadgets||[]).map(getName).join('; ')}"`,
    log.skinRating||'',
    `"${(log.reactions||[]).join('; ')}"`,
    `"${(log.skinNotes||'').replace(/"/g,"'")}"`,
  ]);
  const csv=[headers.join(','),...rows.map(r=>r.join(','))].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`lume_diary_${today()}.csv`; a.click();
  URL.revokeObjectURL(url);
}

// =============================================
// STORAGE HOOK
// =============================================
function useStorage(key, init) {
  const [val,setVal]=useState(()=>{
    try { const s=localStorage.getItem(key); return s?JSON.parse(s):init; } catch{return init;}
  });
  const set=useCallback((updater)=>{
    setVal(prev=>{
      const next=typeof updater==='function'?updater(prev):updater;
      try{localStorage.setItem(key,JSON.stringify(next));}catch{}
      return next;
    });
  },[key]);
  return [val,set];
}

function useIsDesktop() {
  const [desk,setDesk]=useState(()=>window.innerWidth>=768);
  useEffect(()=>{
    const h=()=>setDesk(window.innerWidth>=768);
    window.addEventListener('resize',h);
    return ()=>window.removeEventListener('resize',h);
  },[]);
  return desk;
}

const JBIN = 'https://api.jsonbin.io/v3';

function fetchWithTimeout(url, opts, ms=25000) {
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal })
    .catch(e => { clearTimeout(tid); throw new Error(e.name === 'AbortError' ? 'Нет ответа от сервера (таймаут). Проверь интернет.' : 'Нет соединения с сервером.'); })
    .finally(() => clearTimeout(tid));
}

async function cloudPush(apiKey, binId, payload) {
  const url    = binId ? `${JBIN}/b/${binId}` : `${JBIN}/b`;
  const method = binId ? 'PUT' : 'POST';
  const headers = { 'Content-Type':'application/json', 'X-Master-Key': apiKey };
  if (!binId) { headers['X-Bin-Name'] = 'lume-beauty-diary'; headers['X-Bin-Private'] = 'true'; }
  const r = await fetchWithTimeout(url, { method, headers, body: JSON.stringify(payload) });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || 'HTTP ' + r.status); }
  const d = await r.json();
  return d.metadata?.id || binId;
}

async function cloudPull(apiKey, binId) {
  const r = await fetchWithTimeout(`${JBIN}/b/${binId}/latest`, { headers: { 'X-Master-Key': apiKey } });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.message || 'HTTP ' + r.status); }
  const d = await r.json();
  return d.record;
}

// Экспорт / Импорт без внешних сервисов
function exportCode(products, logs) {
  const data = { products: products||[], logs: logs||{} };
  return btoa(unescape(encodeURIComponent(JSON.stringify(data)))).replace(/=/g,'');
}
function importCode(code) {
  try {
    const json = decodeURIComponent(escape(atob(code.trim().replace(/\s/g,''))));
    return JSON.parse(json);
  } catch { throw new Error('Неверный код'); }
}

function mergeSync(localProducts, localLogs, remote) {
  // Products: merge by id, keep newer (by updatedAt)
  const pMap = {};
  for (const p of [...(remote.products||[]), ...localProducts]) {
    const ex = pMap[p.id];
    if (!ex || (p.updatedAt||0) >= (ex.updatedAt||0)) pMap[p.id] = p;
  }
  // Logs: merge by date key, keep newer
  const lMerged = { ...(remote.logs||{}) };
  for (const [date, entry] of Object.entries(localLogs||{})) {
    const remEntry = lMerged[date];
    if (!remEntry || (entry.updatedAt||0) >= (remEntry.updatedAt||0)) lMerged[date] = entry;
  }
  return { products: Object.values(pMap), logs: lMerged };
}

function SyncSheet({ products, setProducts, logs, setLogs, onClose }) {
  const [apiKey,    setApiKey]   = useStorage('lume_sync_key',  '');
  const [binId,     setBinId]    = useStorage('lume_sync_bin',  '');
  const [lastSync,  setLastSync] = useStorage('lume_sync_time', '');
  const [ocrKey,    setOcrKey]   = useStorage('lume_ocr_key',   '');
  const [status,    setStatus]   = useState('');
  const [loading,   setLoading]  = useState(false);
  const [tab,       setTab]      = useState('sync'); // sync | phone

  async function doSync() {
    const key = apiKey.trim();
    if (!key) { setStatus('❌ Введи API-ключ'); return; }
    setLoading(true); setStatus('Синхронизируем…');
    try {
      let currentBin = binId.trim();

      // Если bin не задан — ищем существующий по API-ключу
      if (!currentBin) {
        setStatus('Ищем данные в облаке…');
        try {
          const listR = await fetch(`${JBIN}/b`, { headers: { 'X-Master-Key': key } });
          if (listR.ok) {
            const listD = await listR.json();
            const bins = listD.binsMeta || listD || [];
            const found = bins.find(b => (b.name || b.snippetMeta?.name) === 'lume-beauty-diary');
            if (found) {
              currentBin = found.id || found._id;
              setBinId(currentBin);
              setStatus('Найдена корзина, загружаем…');
            }
          }
        } catch(e) { /* листинг недоступен — пойдём дальше */ }
      }

      if (currentBin) {
        // Pull → merge → push
        const remote = await cloudPull(key, currentBin);
        const merged = mergeSync(products, logs, remote);
        setProducts(merged.products);
        setLogs(merged.logs);
        await cloudPush(key, currentBin, merged);
      } else {
        // Первый запуск — создаём новую корзину
        setStatus('Создаём облачную корзину…');
        const newBin = await cloudPush(key, null, { products, logs });
        setBinId(newBin);
        currentBin = newBin;
      }
      const ts = new Date().toLocaleString('ru');
      setLastSync(ts);
      setStatus('✅ Готово · ' + ts);
    } catch(e) {
      setStatus('❌ ' + (e.message||'Проверь ключ и интернет'));
    }
    setLoading(false);
  }

  const [importInput, setImportInput] = useState('');
  const [exportText,  setExportText]  = useState('');
  const [codeMsg,     setCodeMsg]     = useState('');

  function doExport() {
    const code = exportCode(products, logs);
    setExportText(code);
    setCodeMsg('');
  }
  function doImport() {
    try {
      const data = importCode(importInput);
      const merged = mergeSync(products, logs, data);
      setProducts(merged.products);
      setLogs(merged.logs);
      setCodeMsg('✅ Данные загружены!');
      setImportInput('');
    } catch(e) { setCodeMsg('❌ ' + e.message); }
  }

  const tabBtn = (id, label) => (
    <button onClick={()=>setTab(id)} style={{
      flex:1, padding:'8px 0', borderRadius:9, border:'none', cursor:'pointer', fontSize:13, fontWeight:600,
      background: tab===id ? 'var(--primary)' : 'transparent',
      color: tab===id ? '#fff' : 'var(--text-3)'
    }}>{label}</button>
  );

  return (
    <div className="backdrop" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-title">☁️ Синхронизация</div>

        {/* Tabs */}
        <div style={{display:'flex',background:'var(--bg)',borderRadius:11,padding:3,marginBottom:16}}>
          {tabBtn('sync','JSONBin')}
          {tabBtn('code','📋 Код')}
          {tabBtn('phone','На телефоне')}
        </div>

        {tab==='sync' && <>
          {/* Instructions */}
          <div style={{background:'var(--bg)',borderRadius:12,padding:14,marginBottom:14,fontSize:13,lineHeight:1.75}}>
            <div style={{fontWeight:700,marginBottom:4}}>Как подключить:</div>
            <div>1. Зайди на <b>jsonbin.io</b> → Sign Up (бесплатно)</div>
            <div>2. API Keys → скопируй <b>Master Key</b></div>

            <div style={{marginTop:6,color:'var(--text-3)',fontSize:12}}>На другом устройстве вводи только тот же Master Key — корзина найдётся автоматически</div>
          </div>

            <div style={{fontSize:11,fontWeight:700,color:'var(--text-3)',letterSpacing:'.6px',marginBottom:6}}>API-КЛЮЧ (MASTER KEY)</div>

function BarcodeScanner({ onResult, onClose }) {
  const [err, setErr] = useState('');
  const [hint, setHint] = useState('Запрашиваем доступ к камере...');
  const scannerRef = useRef(null);
  const SCANNER_ID = 'lume-qr-scanner';

  useEffect(() => {
    if (!window.Html5Qrcode) { setErr('Библиотека сканера не загружена'); return; }
    let stopped = false;

    // Сначала явно просим разрешение — это заставляет браузер показать диалог
    navigator.mediaDevices?.getUserMedia({ video: { facingMode: 'environment' } })
      .then(stream => {
        // Сразу освобождаем поток — html5-qrcode создаст свой
        stream.getTracks().forEach(t => t.stop());
        if (stopped) return;
        const scanner = new Html5Qrcode(SCANNER_ID);
        scannerRef.current = scanner;
        setHint('Наведи на штрих-код средства');
        return scanner.start(
          { facingMode: 'environment' },
          { fps: 10, qrbox: { width: 260, height: 110 }, aspectRatio: 1.6 },
          text => { scanner.stop().catch(()=>{}).finally(()=>onResult(text)); },
          () => {}
        );
      })
      .catch(e => {
        if (e.name === 'NotAllowedError') setErr('Доступ к камере запрещён. Нажми на 🔒 в адресной строке браузера и разреши камеру.');
        else if (e.name === 'NotFoundError') setErr('Камера не найдена на этом устройстве.');
        else setErr('Не удалось запустить камеру: ' + e.message);
      });

    return () => { stopped = true; scannerRef.current?.isScanning && scannerRef.current.stop().catch(()=>{}); };
  }, []);

  function close() {
    if (scannerRef.current?.isScanning) scannerRef.current.stop().catch(()=>{}).finally(onClose);
    else onClose();
  }

  return (
    <div className="backdrop" onClick={e=>e.target===e.currentTarget&&close()}>
      <div className="sheet" onClick={e=>e.stopPropagation()}>
        <div className="sheet-handle"/>
        <div className="sheet-title" style={{textAlign:'center'}}>📷 Штрих-код</div>
        {err
          ? <div style={{textAlign:'center',padding:'24px'}}>
              <div style={{fontSize:36,marginBottom:10}}>📷</div>
              <div style={{fontSize:14,fontWeight:600,color:'var(--danger)',marginBottom:12}}>{err}</div>
              <div style={{fontSize:12,color:'var(--text-3)',lineHeight:1.5}}>
                Safari: Настройки → Сайты → Камера<br/>Chrome: 🔒 в адресной строке → Камера → Разрешить
              </div>
            </div>
          : <>
              <div id={SCANNER_ID} style={{width:'100%',borderRadius:12,overflow:'hidden',background:'#000'}}/>
              <div style={{textAlign:'center',fontSize:13,color:'var(--text-3)',marginTop:12}}>{hint}</div>
            </>
        }
        <button className="btn-ghost" onClick={close} style={{marginTop:8}}>Отмена</button>
      </div>
    </div>
  );
}

// Подготавливает изображение для Tesseract: resize + мягкий grayscale
function prepareForOCR(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Не удалось прочитать файл'));
    reader.onload = (ev) => {
      const img = new Image();
      img.onerror = () => reject(new Error('Не удалось загрузить изображение'));
      img.onload = () => {
        // 1600px — Tesseract лучше работает с крупными изображениями
        const MAX = 1600;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        // Grayscale
        const id = ctx.getImageData(0, 0, w, h);
        const d = id.data;
        for (let i = 0; i < d.length; i += 4) {
          const g = 0.299 * d[i] + 0.587 * d[i+1] + 0.114 * d[i+2];
          d[i] = d[i+1] = d[i+2] = g;
        }
        ctx.putImageData(id, 0, 0);
        // Шарпинг через unsharp mask — критично для мелкого текста на мобильных фото
        const src = ctx.getImageData(0, 0, w, h);
        const dst = ctx.createImageData(w, h);
        const s = src.data, o = dst.data;
        // Ядро: центр ×5, соседи ×−1 (классический sharpen)
        for (let y = 1; y < h - 1; y++) {
          for (let x = 1; x < w - 1; x++) {
            const i = (y * w + x) * 4;
            for (let c = 0; c < 3; c++) {
              const val = 5 * s[i+c]
                - s[((y-1)*w+x)*4+c]
                - s[((y+1)*w+x)*4+c]
                - s[(y*w+(x-1))*4+c]
                - s[(y*w+(x+1))*4+c];
              o[i+c] = Math.min(255, Math.max(0, val));
            }
            o[i+3] = 255;
          }
        }
        ctx.putImageData(dst, 0, 0);
        canvas.toBlob(blob => resolve(blob || file), 'image/png');
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function ProductSearchSheet({ onSelect, onClose }) {
  const [q,          setQ]          = useState('');
  const [pasted,     setPasted]     = useState('');
  const [ocrLoading, setOcrLoading] = useState(false);
  const [ocrMsg,     setOcrMsg]     = useState('');
  const [ocrKey]                    = useStorage('lume_ocr_key', '');
  const inputRef = useRef();
  const photoRef = useRef();

  useEffect(() => { setTimeout(()=>inputRef.current?.focus(), 100); }, []);

  async function handleProductPhoto(e) {
    const file = e.target.files?.[0];
    if (!file) return;
    setOcrLoading(true); setOcrMsg('Обрабатываем фото…');
    try {
      const processed = await prepareForOCR(file);
      setOcrMsg('Читаем текст…');
      // PSM 11 = sparse text, лучший режим для этикеток с разным расположением текста
      const worker = await Tesseract.createWorker('eng+kor', 1, { logger: () => {} });
      await worker.setParameters({ tessedit_pageseg_mode: '11' });
      const result = await worker.recognize(processed);
      await worker.terminate();
      const rawLines = result.data.text.split('\n').map(l => l.trim()).filter(l => l.length >= 2 && l.length <= 60);
      const skip = /^[\d\s.,\/\-\(\)\[\]]+$|^[^a-zA-Z\uAC00-\uD7A3]{0,2}$|ingredients|inci|состав|water|aqua|\bml\b|\boz\b|www\.|kfda|fda|exp\.|lot\b|mfg|spf|\bph\b|©|®|™/i;
      const good = rawLines.filter(l => !skip.test(l) && /[a-zA-Z\uAC00-\uD7A3]/.test(l));
      const name = good.slice(0, 2).join(' ').replace(/\s{2,}/g, ' ').trim();
      if (name) { setQ(name); setOcrMsg('✅ Распознано — при необходимости отредактируй'); }
      else { setOcrMsg('Не удалось распознать. Сфотографируй название крупнее на светлом фоне.'); }
    } catch(err) { setOcrMsg('⚠️ ' + (err.message || 'попробуй ещё раз')); }
    setOcrLoading(false);
    if (photoRef.current) photoRef.current.value = '';
    setTimeout(() => setOcrMsg(''), 8000);
  }

  const enc = q.trim() ? encodeURIComponent(q.trim()) : '';
  const sites = [
    { label:'INCI Decoder',   sub:'Лучший для состава',   emoji:'🧬', url:`https://incidecoder.com/search?query=${enc}` },

    { label:'iHerb',         sub:'Масс-маркет и K-beauty',emoji:'🌿', url:`https://www.iherb.com/search?kw=${enc}` },

          <button onClick={()=>photoRef.current?.click()} disabled={ocrLoading}

        }

        {/* Сайты-источники */}
        <div style={{fontSize:11,fontWeight:700,color:'var(--text-3)',letterSpacing:'.6px',marginBottom:8}}>ОТКРЫТЬ И НАЙТИ СОСТАВ</div>
        <div style={{marginBottom:16}}>
          {sites.map(({label,sub,emoji,url})=>(
            <a key={label} href={enc ? url : '#'} target="_blank" rel="noreferrer"
              onClick={e=>{ if(!enc){e.preventDefault(); inputRef.current?.focus();} }}
              style={{display:'flex',alignItems:'center',gap:12,padding:'11px 14px',borderRadius:12,background:'var(--surface)',border:'1px solid var(--border-lt)',marginBottom:6,textDecoration:'none',color:'var(--text)',boxShadow:'var(--shadow)',transition:'opacity .15s',opacity: enc?1:.5}}>
              <span style={{fontSize:22,width:28,textAlign:'center'}}>{emoji}</span>

              </div>

          ))}
        </div>

        {/* Вставить состав */}
        <div style={{fontSize:11,fontWeight:700,color:'var(--text-3)',letterSpacing:'.6px',marginBottom:8}}>НАШЛА СОСТАВ? ВСТАВЬ СЮДА (INCI-список)</div>

// Подсказки сочетаний с тем, что уже есть в базе у текущего средства
function ProductCombosForCurrent({ ingredients, ownId, allProducts }) {
  if (!ingredients || !ingredients.trim()) return null;
  const fakeSelf = { id: ownId||'__self__', name:'Это средство', ingredients };
  const others = (allProducts||[]).filter(p => p.id!==ownId && p.category==='current' && p.ingredients);
  const conflicts = checkConflicts([fakeSelf, ...others]).filter(c=>c.pair.includes('Это средство'));
  const synergies = checkSynergies([fakeSelf, ...others]).filter(s=>s.pair.includes('Это средство'));
  if (conflicts.length===0 && synergies.length===0) return null;
  const partner = (pair) => pair.find(n=>n!=='Это средство') || '';
  return (
    <div style={{marginBottom:18}}>
      <div style={{fontSize:11,fontWeight:700,color:'var(--text-3)',letterSpacing:'.6px',marginBottom:8,textTransform:'uppercase'}}>Сочетания с твоей коллекцией</div>
      {synergies.map((s,i)=>(
        <div key={'s'+i} style={{background:'var(--ok-lt)',border:'1px solid rgba(90,145,112,.25)',borderRadius:10,padding:'9px 12px',marginBottom:6}}>
          <div style={{fontSize:12,fontWeight:700,color:'var(--ok)',marginBottom:2}}>✨ {s.title}</div>
          <div style={{fontSize:11,color:'var(--text-3)',marginBottom:3}}>+ {partner(s.pair)}</div>
          <div style={{fontSize:12,color:'var(--text-2)',lineHeight:1.5}}>{s.text}</div>
        </div>
      ))}
      {conflicts.map((c,i)=>(
        <div key={'c'+i} className={`conflict-box${c.severity==='danger'?' danger':''}`} style={{marginBottom:6}}>
          <div className="conflict-title" style={{fontSize:12}}>⚠️ {c.title}</div>
          <div style={{fontSize:11,color:'var(--text-3)',marginBottom:3}}>+ {partner(c.pair)}</div>
          <div className="conflict-detail">{c.text}</div>
        </div>
      ))}
    </div>
  );
}

function ProductSheet({ product, allProducts, onSave, onDelete, onClose }) {
  const isNew=!product?.id;
  const [f,setF]=useState(product||{name:'',brand:'',type:'moisturizer',purpose:'',gadgetModes:[],category:'current',ingredients:'',photo:'',expiryDate:'',openedDate:'',paoMonths:'',trackExpiry:'both',notes:''});
  const [showScanner, setShowScanner]   = useState(false);
  const [showSearch,  setShowSearch]    = useState(false);
  const [ocrLoading,  setOcrLoading]    = useState(false);
  const [scanLoading, setScanLoading]   = useState(false);
  const [scanMsg,     setScanMsg]       = useState('');
  const fileRef = useRef();
  const ocrRef  = useRef();
  const set = (k,v) => setF(p=>({...p,[k]:v}));

  function handlePhoto(e) {
    const file=e.target.files?.[0]; if(!file) return;
    // Сжимаем фото до 500px перед сохранением — экономим localStorage
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        const MAX = 500;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) {
          if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
          else       { w = Math.round(w * MAX / h); h = MAX; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        set('photo', canvas.toDataURL('image/jpeg', 0.75));
      };
      img.onerror = () => set('photo', ev.target.result);
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  // OCR: фото состава → текст
  async function handleOCR(e) {
    const file = e.target.files?.[0]; if(!file) return;
    setOcrLoading(true);
    try {
      const processed = await prepareForOCR(file);
      const worker2 = await Tesseract.createWorker('eng+kor', 1, { logger: () => {} });
      await worker2.setParameters({ tessedit_pageseg_mode: '6' });
      const result = await worker2.recognize(processed);
      await worker2.terminate();
      let text = result.data.text;
      // Пытаемся найти раздел "Состав" / "Ingredients"
      const low = text.toLowerCase();
      const markers = ['ingredients:', 'inci:', 'состав:', 'ingrédients:', 'ingredienti:'];
      for (const m of markers) {
        const idx = low.indexOf(m);
        if (idx >= 0) { text = text.slice(idx + m.length).trim(); break; }
      }
      // Убираем лишние переносы
      text = text.replace(/\r?\n+/g, ', ').replace(/,\s*,/g, ',').replace(/\s{2,}/g,' ').trim();
      if (text) set('ingredients', text);
      else alert('Не удалось распознать состав. Попробуй сфотографировать список ингредиентов крупнее.');
    } catch { alert('Не удалось распознать. Попробуй более чёткое фото.'); }
    setOcrLoading(false);
    if(ocrRef.current) ocrRef.current.value='';
  }

  // Штрих-код → поиск в Open Beauty Facts
  async function handleBarcodeResult(barcode) {
    setShowScanner(false);
    setScanLoading(true); setScanMsg('Ищем продукт по штрих-коду...');
    try {
      const fields = 'product_name,product_name_en,product_name_ko,brands,ingredients_text,ingredients_text_en,ingredients_text_ko';
      const res = await fetch(`https://world.openbeautyfacts.org/api/v0/product/${barcode}.json?fields=${fields}`);
      const data = await res.json();
      if (data.status===1 && data.product) {
        const p = data.product;
        setF(prev=>({
          ...prev,
          name: p.product_name_en||p.product_name_ko||p.product_name||prev.name,
          brand: p.brands||prev.brand,
          ingredients: p.ingredients_text_en||p.ingredients_text_ko||p.ingredients_text||prev.ingredients,
        }));
        setScanMsg(`✅ Найдено: ${p.product_name_en||p.product_name_ko||p.product_name||barcode}`);
      } else {
        // Fallback: UPC Item DB (работает для корейских штрих-кодов 880-xxx)
        setScanMsg('Ищем в других базах...');
        try {
          const r2 = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${barcode}`);
          const d2 = await r2.json();
          if (d2.items?.length) {
            const item = d2.items[0];
            setF(prev=>({
              ...prev,
              name: item.title||prev.name,
              brand: item.brand||prev.brand,
            }));
            setScanMsg(`✅ Найдено: ${item.title||barcode} (состав нужно добавить вручную)`);
          } else {
            setScanMsg(`Штрих-код ${barcode} — не найден. Заполни вручную.`);
          }
        } catch { setScanMsg(`Штрих-код ${barcode} — не найден ни в одной базе.`); }
      }
    } catch { setScanMsg('Ошибка поиска. Проверь интернет.'); }
    setScanLoading(false);
    setTimeout(()=>setScanMsg(''), 6000);
  }

  // Выбор из поиска по названию
  function handleSearchSelect(p) {
    setShowSearch(false);
    setF(prev=>({
      ...prev,

  const sc = selfConflicts(f.ingredients);

        <div className="field">
          <div className="field-label">Заметки</div>
          <textarea className="field-input" rows={2} placeholder="Впечатления, цена, где купила..." value={f.notes} onChange={e=>set('notes',e.target.value)}/>
        </div>

        <button className="btn-primary" onClick={save} style={{marginBottom:12}}>{isNew?'Добавить средство':'Сохранить изменения'}</button>
        {!isNew&&<button className="btn-ghost" onClick={()=>{if(confirm('Удалить это средство?'))onDelete(f.id);}}>Удалить средство</button>}
      </div>
    </div>

    {showScanner && <BarcodeScanner onResult={handleBarcodeResult} onClose={()=>setShowScanner(false)}/>}
    {showSearch  && <ProductSearchSheet onSelect={handleSearchSelect} onClose={()=>setShowSearch(false)}/>}
    </>
  );
}

// Карточка средства в Базе с шильдой этапа и назначения
function ProductCard({ p, onClick }) {
  const days = getDaysLeft(p), st = expiryStatus(days);
  const t = PRODUCT_TYPES.find(x=>x.id===p.type) || {label:'Другое', icon:'🧴'};
  const sn = (t.step && t.step<=12) ? t.step : null;
  const purpose = p.purpose && PRODUCT_PURPOSES[p.type]?.find(x=>x.id===p.purpose);
  const modes = (p.gadgetModes||[]).map(id=>GADGET_MODES.find(m=>m.id===id)).filter(Boolean);
  return (
    <div className="product-card" onClick={onClick} style={{position:'relative'}}>
      {/* Шильда этапа в углу фотографии */}
      {sn && (
        <div title={`Этап ${sn}: ${t.label}`} style={{
          position:'absolute', top:6, left:6, zIndex:2,
          background:'var(--primary)', color:'#fff',
          width:24, height:24, borderRadius:8, fontSize:12, fontWeight:800,
          display:'flex', alignItems:'center', justifyContent:'center',
          boxShadow:'0 2px 6px rgba(31,42,38,.25)'
        }}>{sn}</div>
      )}
      {t.isGadget && (
        <div title="Гаджет" style={{
          position:'absolute', top:6, left:6, zIndex:2,
          background:'var(--surface)', color:'var(--primary-dk)',
          padding:'2px 8px', borderRadius:8, fontSize:10, fontWeight:700,
          boxShadow:'0 2px 6px rgba(31,42,38,.20)'
        }}>💎 Гаджет</div>
      )}
      <div className="product-photo">{p.photo?<img src={p.photo} alt={p.name}/>:typeIcon(p.type)}</div>
      <div className="product-info">
        <div style={{display:'flex',alignItems:'center',gap:5,marginBottom:2,flexWrap:'wrap'}}>
          <span style={{fontSize:10,color:'var(--text-3)',fontWeight:600,letterSpacing:'.3px',textTransform:'uppercase'}}>
            {t.icon} {t.label}
          </span>
          {purpose && (
            <span style={{fontSize:9,padding:'1px 6px',borderRadius:6,background:'var(--primary-lt)',color:'var(--primary-dk)',fontWeight:700}}>
              {purpose.icon} {purpose.label}
            </span>
          )}
        </div>
        <div className="product-name">{p.name}</div>
        {p.brand&&<div className="product-brand">{p.brand}</div>}
        {modes.length>0 && (
          <div style={{display:'flex',flexWrap:'wrap',gap:3,marginTop:4}}>
            {modes.slice(0,3).map(m=>(
              <span key={m.id} style={{fontSize:9,padding:'1px 5px',borderRadius:5,background:'var(--bg)',color:'var(--text-2)',fontWeight:600}}>
                {m.icon} {m.label}
              </span>
            ))}
            {modes.length>3 && <span style={{fontSize:9,color:'var(--text-3)',fontWeight:600}}>+{modes.length-3}</span>}
          </div>
        )}
        {days!==null&&<div className={`badge badge-${st}`} style={{marginTop:4}}>{days<0?'Истёк':`${days} дн.`}</div>}
      </div>
    </div>
  );
}

function ProductsScreen({ products, setProducts }) {
  const [filter,setFilter]=useState('all');
  const [search,setSearch]=useState('');
  const [sortBy,setSortBy]=useState('default'); // default | type | name | expiry
  const [sheet,setSheet]=useState(null);

  const filtered=products.filter(p=>{
    if(filter!=='all'&&p.category!==filter) return false;
    const q=search.toLowerCase();
    return !q||p.name.toLowerCase().includes(q)||(p.brand||'').toLowerCase().includes(q);
  });

  // Сортировка
  const stepN = (id) => PRODUCT_TYPES.find(t=>t.id===id)?.step ?? 99;
  const shown = [...filtered].sort((a,b)=>{
    if(sortBy==='name') return a.name.localeCompare(b.name,'ru');
    if(sortBy==='expiry') {
      const da=getDaysLeft(a)??9999, db=getDaysLeft(b)??9999;
      return da-db;
    }
    if(sortBy==='type') return (a.type||'').localeCompare(b.type||'');
    if(sortBy==='step') {
      const sa=stepN(a.type), sb=stepN(b.type);
      if (sa!==sb) return sa-sb;
      return a.name.localeCompare(b.name,'ru');
    }
    return 0;
  });

  // Группировка по типу или по этапу
  const grouped = sortBy==='type' ? shown.reduce((acc,p)=>{
    const t = PRODUCT_TYPES.find(x=>x.id===p.type)||{label:'Другое',icon:'🧴'};
    const key = t.icon+' '+t.label;
    if(!acc[key]) acc[key]=[];
    acc[key].push(p);
    return acc;
  },{}) :
  sortBy==='step' ? shown.reduce((acc,p)=>{
    const t = PRODUCT_TYPES.find(x=>x.id===p.type)||{label:'Другое',icon:'🧴',step:99};
    const sn = t.step;
    const key = (t.isGadget) ? '💎 Гаджеты' :
                (sn && sn<=12) ? `Этап ${sn} — ${t.icon} ${t.label}` :
                '🧴 Без этапа';
    if(!acc[key]) acc[key]=[];
    acc[key].push(p);
    return acc;
  },{}) : null;

  function save(product){
    setProducts(prev=>{const i=prev.findIndex(p=>p.id===product.id);if(i>=0){const n=[...prev];n[i]=product;return n;}return[product,...prev];});
    setSheet(null);
  }
  function del(id){setProducts(prev=>prev.filter(p=>p.id!==id));setSheet(null);}

  return (
    <>
      <div className="screen">
        <div className="page-header">
          <div className="page-title">База 🧴</div>
          <div className="page-sub">{products.length} средств добавлено</div>
        </div>

        <div className="search-wrap">
          <IcoSearch/>
          <input placeholder="Поиск по названию или бренду..." value={search} onChange={e=>setSearch(e.target.value)}/>
          {search&&<button onClick={()=>setSearch('')} style={{color:'var(--text-3)',fontSize:20,lineHeight:1,flexShrink:0}}>×</button>}
        </div>

        <div className="tabs">
          {[{id:'all',label:'Все'},{id:'current',label:'✅ Сейчас'},{id:'reserve',label:'🗂️ Резерв'},{id:'past',label:'📦 Было'},{id:'wishlist',label:'⭐ Хочу'}].map(t=>(
            <button key={t.id} className={`tab${filter===t.id?' active':''}`} onClick={()=>setFilter(t.id)}>{t.label}</button>
          ))}
        </div>

        {/* Сортировка */}
        <div style={{display:'flex',gap:6,padding:'0 16px',marginBottom:12,overflowX:'auto',paddingBottom:2}}>
          {[['default','По дате'],['step','По этапу'],['type','По типу'],['name','По названию'],['expiry','По сроку']].map(([id,lbl])=>(
            <button key={id} onClick={()=>setSortBy(id)}
              style={{padding:'5px 12px',borderRadius:20,fontSize:12,fontWeight:600,border:'none',cursor:'pointer',flexShrink:0,
                background:sortBy===id?'var(--primary)':'var(--surface)',
                color:sortBy===id?'#fff':'var(--text-2)',
                boxShadow:'var(--shadow)'}}>
              {lbl}
            </button>
          ))}
        </div>

        {shown.length===0
          ? <div className="empty"><div className="empty-icon">{filter==='wishlist'?'⭐':filter==='past'?'📦':filter==='reserve'?'🗂️':'🧴'}</div><div className="empty-title">{search?'Ничего не найдено':'Пока пусто'}</div><div className="empty-text">{search?'Попробуй другой запрос':filter==='reserve'?'Здесь хранятся невскрытые средства и дубликаты':'Нажми «+» чтобы добавить первое средство'}</div></div>
          : grouped
            ? Object.entries(grouped).map(([groupLabel,items])=>(
                <div key={groupLabel}>
                  <div style={{padding:'0 16px',marginBottom:8,marginTop:16,fontSize:13,fontWeight:700,color:'var(--text-2)',letterSpacing:'.01em'}}>{groupLabel}</div>
                  <div className="product-grid">
                    {items.map(p=><ProductCard key={p.id} p={p} onClick={()=>setSheet(p)}/>)}
                  </div>
                </div>
              ))
            : <div className="product-grid">
                {shown.map(p=><ProductCard key={p.id} p={p} onClick={()=>setSheet(p)}/>)}
              </div>
        }
      </div>

      <button className="fab" onClick={()=>setSheet('new')}>+</button>

      {sheet&&<ProductSheet product={sheet==='new'?null:sheet} allProducts={products} onSave={save} onDelete={del} onClose={()=>setSheet(null)}/>}
    </>
  );
}

// COMBOS PANEL — сворачиваемые блоки конфликтов и хороших сочетаний
// =============================================
function CombosPanel({ conflicts, synergies }) {
  const [openBad,  setOpenBad]  = useState(false);
  const [openGood, setOpenGood] = useState(false);

  const Toggle = ({open, onClick, title, color, bg, count}) => (
    <button
      onClick={onClick}
      style={{
        width:'100%', display:'flex', alignItems:'center', justifyContent:'space-between',
        padding:'10px 14px', borderRadius:12, border:'none', cursor:'pointer',
        background:bg, color, fontWeight:700, fontSize:13, marginBottom:8,
        boxShadow:'0 1px 3px rgba(0,0,0,.04)',
      }}>
      <span>{title} <span style={{opacity:.7,fontWeight:600,marginLeft:4}}>· {count}</span></span>
      <span style={{fontSize:16,transform:open?'rotate(180deg)':'none',transition:'transform .2s'}}>⌄</span>
    </button>
  );

  return (
    <>
      {conflicts.length>0 && (
        <Toggle
          open={openBad} onClick={()=>setOpenBad(o=>!o)}
          title="⚠️ Плохие сочетания"
          color="var(--danger)" bg="var(--danger-lt)" count={conflicts.length}
        />
      )}
      {openBad && conflicts.map((c,i)=>(
        <div key={i} className={`conflict-box${c.severity==='danger'?' danger':''}`}>
          <div className="conflict-title">{c.title}{c.period&&<span style={{fontSize:11,fontWeight:400,opacity:.7,marginLeft:6}}>({c.period})</span>}</div>
          <div style={{fontSize:11,color:'var(--text-3)',marginBottom:3}}>{c.pair.join(' + ')}</div>
          <div className="conflict-detail">{c.text}</div>
        </div>
      ))}

      {synergies.length>0 && (
        <Toggle
          open={openGood} onClick={()=>setOpenGood(o=>!o)}
          title="✨ Хорошие сочетания"
          color="var(--ok)" bg="var(--ok-lt)" count={synergies.length}
        />
      )}
      {openGood && synergies.map((s,i)=>(
        <div key={i} style={{background:'var(--ok-lt)',border:'1px solid rgba(90,145,112,.25)',borderRadius:12,padding:'10px 14px',marginBottom:8}}>
          <div style={{fontWeight:700,fontSize:13,color:'var(--ok)',marginBottom:2}}>{s.title}</div>
          <div style={{fontSize:11,color:'var(--text-3)',marginBottom:4}}>{s.pair.join(' + ')}</div>
          <div style={{fontSize:12,color:'var(--text-2)'}}>{s.text}</div>
        </div>
      ))}
    </>
  );
}

// =============================================
// TRACKER SCREEN
// =============================================
function TrackerScreen({ products, logs, setLogs, isDesktop }) {
  const [date,setDate]=useState(today());
  const photoRef=useRef();
  const current=products.filter(p=>p.category==='current');
  const cosmetics=current.filter(p=>!PRODUCT_TYPES.find(t=>t.id===p.type)?.isGadget);
  const gadgets=current.filter(p=>PRODUCT_TYPES.find(t=>t.id===p.type)?.isGadget);
  const log=logs[date]||{};
  const isToday=date===today();

  function upd(path,val){
    setLogs(prev=>{
      const d={...(prev[date]||{})};
      if(path.length===1) d[path[0]]=val;
      else d[path[0]]={...(d[path[0]]||{}),[path[1]]:val};
      return{...prev,[date]:d};
    });
  }
  function toggle(period,id){
    const cur=log[period]||[];
    upd([period],cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]);
  }
  function toggleReaction(id){
    const cur=log.reactions||[];
    upd(['reactions'],cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]);
  }

  function toggleGadget(id){
    const cur=log.gadgets||[];
    upd(['gadgets'],cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]);
  }

  function toggleExtra(id){
    const cur=log.extra||[];
    upd(['extra'],cur.includes(id)?cur.filter(x=>x!==id):[...cur,id]);
  }

  const morningProds=cosmetics.filter(p=>(log.morning||[]).includes(p.id));
  const eveningProds=cosmetics.filter(p=>(log.evening||[]).includes(p.id));
  const allUsed=[...(log.morning||[]),...(log.evening||[])];
  const usedProds=cosmetics.filter(p=>allUsed.includes(p.id));
  const morningConflicts=checkConflicts(morningProds).map(c=>({...c,period:'☀️ утро'}));
  const eveningConflicts=checkConflicts(eveningProds).map(c=>({...c,period:'🌙 вечер'}));
  const conflicts=[...morningConflicts,...eveningConflicts];
  const synergies=checkSynergies(usedProds);
  const dateDisplay=isToday?'Сегодня':new Date(date+'T12:00:00').toLocaleDateString('ru-RU',{day:'numeric',month:'short',weekday:'short'});

  function handleSkinPhoto(e){
    const file=e.target.files?.[0]; if(!file) return;
    const r=new FileReader(); r.onload=ev=>upd(['skinPhoto'],ev.target.result); r.readAsDataURL(file);
  }

  // Сортируем средства по этапу ухода (step) — чтобы шли по порядку нанесения
  const stepOf = id => PRODUCT_TYPES.find(t=>t.id===id)?.step ?? 99;
  const sortedCosmetics = [...cosmetics].sort((a,b)=>{
    const s = stepOf(a.type)-stepOf(b.type);
    if (s!==0) return s;
    if (a.type!==b.type) return (a.type||'').localeCompare(b.type||'');
    return a.name.localeCompare(b.name,'ru');
  });

  // Какие этапы 1-12 присутствуют в коллекции
  const presentSteps = new Set(cosmetics.map(p=>stepOf(p.type)).filter(s=>s>=1&&s<=12));
  const missingSteps = [];
  for (let i=1;i<=12;i++) if (!presentSteps.has(i)) missingSteps.push(i);

  const RoutineSection = ({period,label})=>{
    const done=(log[period]||[]).length;
    return (
      <div className="routine-card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
          <div>
            <div style={{fontSize:16,fontWeight:700}}>{label}</div>
            <div style={{fontSize:12,color:'var(--text-3)',marginTop:2}}>{done} / {cosmetics.length} средств</div>
          </div>
          {done===cosmetics.length&&cosmetics.length>0&&<div style={{fontSize:12,fontWeight:700,color:'var(--ok)',background:'var(--ok-lt)',padding:'4px 10px',borderRadius:20}}>✓ Готово</div>}
        </div>

        {/* Индикатор всех 12 этапов: видно сразу, какие этапы пропущены */}
        {cosmetics.length>0 && (
          <div style={{display:'flex',gap:3,marginBottom:10,flexWrap:'wrap'}}>
            {Array.from({length:12},(_,i)=>i+1).map(n=>{
              const present = presentSteps.has(n);
              return (
                <div key={n} title={`Этап ${n}${present?' — есть':' — нет средства'}`}
                  style={{
                    width:18, height:18, borderRadius:5, fontSize:10, fontWeight:700,
                    display:'flex', alignItems:'center', justifyContent:'center',
                    background: present ? 'var(--primary)' : 'var(--bg)',
                    color: present ? '#fff' : 'var(--text-3)',
                    border: present ? 'none' : '1px dashed var(--border)',
                  }}>{n}</div>
              );
            })}
          </div>
        )}

        {cosmetics.length===0
          ?<div style={{textAlign:'center',fontSize:13,color:'var(--text-3)',padding:'12px 0'}}>Добавь средства в базу («Есть сейчас»)</div>
          :sortedCosmetics.map(p=>{
            const checked=(log[period]||[]).includes(p.id);
            const t = PRODUCT_TYPES.find(x=>x.id===p.type) || {label:'Другое', icon:'🧴'};
            const stepN = (t.step && t.step<=12) ? t.step : null;
            return (
              <div key={p.id} className="check-item" onClick={()=>toggle(period,p.id)}>
                <div className={`check-box${checked?' on':''}`}>{checked&&<IcoCheck/>}</div>
                {/* Чип-этап */}
                {stepN!==null && (
                  <div style={{
                    width:22,height:22,borderRadius:6,background:'var(--primary-lt)',color:'var(--primary-dk)',
                    fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0
                  }} title={`Этап ${stepN}: ${t.label}`}>{stepN}</div>
                )}
                {/* Миниатюра: фото или иконка типа */}
                <div style={{width:36,height:36,borderRadius:8,background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,overflow:'hidden'}}>
                  {p.photo
                    ? <img src={p.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                    : <span style={{fontSize:20}}>{typeIcon(p.type)}</span>
                  }
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:14,textDecoration:checked?'line-through':'none',color:checked?'var(--text-3)':'var(--text)'}}>{p.name}</div>
                  <div style={{fontSize:10,color:'var(--text-3)',marginTop:1}}>
                    {t.icon} {t.label}{p.brand?` · ${p.brand}`:''}
                  </div>
                </div>
              </div>
            );
          })
        }
        <textarea className="field-input" placeholder={`Заметки к ${period==='morning'?'утренней':'вечерней'} рутине...`} value={log[`${period}Notes`]||''} onChange={e=>upd([`${period}Notes`],e.target.value)} rows={2} style={{marginTop:12,background:'var(--bg)',borderRadius:8,padding:10,fontSize:14}}/>
      </div>
    );
  };

  const ExtraSection = ()=>{
    const [open, setOpen] = useState(!!(log.extra?.length || log.extraNotes));
    const done = (log.extra||[]).length;
    const weekCount = Array.from({length:7},(_,i)=>{
      const d=new Date(); d.setDate(d.getDate()-i);
      return d.toISOString().slice(0,10);
    }).filter(k=>logs[k]?.extra?.length>0).length;
    return (
      <div className="routine-card" style={{marginTop:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}} onClick={()=>setOpen(o=>!o)}>
          <div>
            <div style={{fontSize:16,fontWeight:700}}>✨ Дополнительный уход</div>
            <div style={{fontSize:12,color:'var(--text-3)',marginTop:2}}>
              {done>0 ? `${done} средств сегодня` : 'маски, пилинги, гаджеты, спец. уход'}
              {weekCount>0 && <span style={{marginLeft:8,background:'var(--primary-lt)',color:'var(--primary)',borderRadius:10,padding:'1px 7px',fontSize:11,fontWeight:600}}>{weekCount}×/неделю</span>}
            </div>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {done>0&&<div style={{fontSize:12,fontWeight:700,color:'var(--ok)',background:'var(--ok-lt)',padding:'4px 10px',borderRadius:20}}>✓ {done}</div>}
            <span style={{fontSize:18,color:'var(--text-3)',transform:open?'rotate(180deg)':'none',transition:'transform .2s'}}>⌄</span>
          </div>
        </div>
        {open && <>
          <div style={{marginTop:12}}>
            {current.length===0
              ? <div style={{textAlign:'center',fontSize:13,color:'var(--text-3)',padding:'12px 0'}}>Добавь средства в базу («Есть сейчас»)</div>
              : [...current].sort((a,b)=>(stepOf(a.type)-stepOf(b.type))).map(p=>{
                const checked=(log.extra||[]).includes(p.id);
                return (
                  <div key={p.id} className="check-item" onClick={()=>toggleExtra(p.id)}>
                    <div className={`check-box${checked?' on':''}`}>{checked&&<IcoCheck/>}</div>
                    <div style={{width:32,height:32,borderRadius:8,background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,overflow:'hidden'}}>
                      {p.photo
                        ? <img src={p.photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
                        : <span style={{fontSize:18}}>{typeIcon(p.type)}</span>
                      }
                    </div>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:14,textDecoration:checked?'line-through':'none',color:checked?'var(--text-3)':'var(--text)'}}>{p.name}</div>
                      {p.brand&&<div style={{fontSize:11,color:'var(--text-3)'}}>{p.brand}</div>}
                    </div>
                  </div>
                );
              })
            }
          </div>
          <textarea className="field-input" placeholder="Что использовала, как кожа реагировала..." value={log.extraNotes||''} onChange={e=>upd(['extraNotes'],e.target.value)} rows={2} style={{marginTop:10,background:'var(--bg)',borderRadius:8,padding:10,fontSize:14}}/>
        </>}
      </div>
    );
  };

  const GadgetsSection = ()=>{
    const done=(log.gadgets||[]).length;
    if(gadgets.length===0) return null;
    return (
      <div className="routine-card" style={{marginTop:12}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
          <div>
            <div style={{fontSize:16,fontWeight:700}}>💎 Бьюти-гаджеты</div>
            <div style={{fontSize:12,color:'var(--text-3)',marginTop:2}}>{done} / {gadgets.length} использовано</div>
          </div>
          {done===gadgets.length&&gadgets.length>0&&<div style={{fontSize:12,fontWeight:700,color:'var(--ok)',background:'var(--ok-lt)',padding:'4px 10px',borderRadius:20}}>✓ Готово</div>}
        </div>
        {gadgets.map(p=>{
          const checked=(log.gadgets||[]).includes(p.id);
          const modes = (p.gadgetModes||[]).map(id=>GADGET_MODES.find(m=>m.id===id)).filter(Boolean);
          return (
            <div key={p.id} className="check-item" onClick={()=>toggleGadget(p.id)} style={{alignItems:'flex-start'}}>

      {/* Routine - side-by-side on desktop */}
      <div className="section">
        <div className={isDesktop?'routine-cols':''}>

  );
}

// ANALYTICS SCREEN
// =============================================
function AnalyticsScreen({ products, logs, isDesktop }) {
  const days14=Array.from({length:14},(_,i)=>{
    const d=new Date(); d.setDate(d.getDate()-(13-i));
    const key=d.toISOString().slice(0,10);
    return{key,rating:logs[key]?.skinRating||0,lbl:d.getDate()};
  });
  const rated=days14.filter(d=>d.rating>0);
  const avg=rated.length?(rated.reduce((s,d)=>s+d.rating,0)/rated.length).toFixed(1):'—';

  const usage={};
  Object.values(logs).forEach(l=>[...(l.morning||[]),...(l.evening||[]),...(l.extra||[])].forEach(id=>{usage[id]=(usage[id]||0)+1;}));
  const top5=Object.entries(usage).sort(([,a],[,b])=>b-a).slice(0,5).map(([id,cnt])=>({p:products.find(p=>p.id===id),cnt})).filter(x=>x.p);
  const extraDays14=days14.filter(d=>logs[d.key]?.extra?.length>0).length;

  const reactCnt={};
  Object.values(logs).forEach(l=>(l.reactions||[]).forEach(r=>{reactCnt[r]=(reactCnt[r]||0)+1;}));

  const expiring=products.filter(p=>p.category==='current').map(p=>({...p,daysLeft:getDaysLeft(p)})).filter(p=>p.daysLeft!==null&&p.daysLeft<=60).sort((a,b)=>a.daysLeft-b.daysLeft);
  const maxBar=Math.max(...days14.map(d=>d.rating),1);

  return (
    <div className="screen">
      <div className="page-header"><div className="page-title">Аналитика 📊</div></div>

      {/* Skin trend */}
      <div className="section">
        <div className="card">
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
            <div style={{fontWeight:700,fontSize:15}}>Состояние кожи — 14 дней</div>
            <div style={{fontSize:24,fontWeight:800,color:'var(--primary)'}}>⌀ {avg}</div>
          </div>
          <div className="bar-chart" style={{height:isDesktop?110:90}}>
            {days14.map((d,i)=>(
              <div key={d.key} className="bar-col">
                <div className="bar" style={{height:d.rating?`${(d.rating/maxBar)*(isDesktop?85:65)+8}px`:'4px',background:d.rating?`hsl(${20+(d.rating-1)*25},65%,${55-d.rating*4}%)`:'var(--border)'}}/>
                {(i===0||i===6||i===13)&&<div className="bar-lbl">{d.lbl}</div>}
              </div>
            ))}
          </div>
          <div style={{display:'flex',gap:12,marginTop:12,justifyContent:'center'}}>
            {SKIN_EMOJIS.map((e,i)=><span key={i} style={{fontSize:13,color:'var(--text-3)'}}>{e} {i+1}</span>)}
          </div>
        </div>
        {extraDays14>0&&(
          <div style={{marginTop:10,background:'var(--bg)',borderRadius:14,padding:'12px 16px',display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:22}}>✨</span>
            <div>
              <div style={{fontWeight:700,fontSize:14}}>Доп. уход</div>
              <div style={{fontSize:12,color:'var(--text-3)'}}>За 14 дней: {extraDays14} раз</div>
            </div>
          </div>
        )}
      </div>

      {/* Desktop: top products + reactions side-by-side */}
      <div className="section">
        <div style={isDesktop?{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}:{}}>

          {top5.length>0&&(
            <div>
              {!isDesktop&&<div className="section-title">Чаще всего используются</div>}
              {isDesktop&&<div className="section-title" style={{marginBottom:12}}>Чаще всего используются</div>}
              <div className="card">
                {top5.map(({p,cnt})=>(
                  <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--bg)'}}>
                    <span style={{fontSize:26}}>{typeIcon(p.type)}</span>
                    <div style={{flex:1,minWidth:0}}><div style={{fontSize:14,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{p.name}</div>{p.brand&&<div style={{fontSize:11,color:'var(--text-3)'}}>{p.brand}</div>}</div>
                    <div style={{fontSize:14,fontWeight:700,color:'var(--primary)',flexShrink:0}}>{cnt}×</div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {Object.keys(reactCnt).length>0&&(
            <div style={!isDesktop?{marginTop:18}:{}}>
              <div className="section-title" style={{marginBottom:12}}>Реакции кожи</div>
              <div className="card">
                {REACTIONS.filter(r=>reactCnt[r.id]).sort((a,b)=>(reactCnt[b.id]||0)-(reactCnt[a.id]||0)).map(r=>(
                  <div key={r.id} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid var(--bg)'}}>
                    <span style={{fontSize:22}}>{r.icon}</span>
                    <div style={{flex:1,fontSize:14}}>{r.label}</div>
                    <div style={{fontSize:13,fontWeight:700,color:'var(--text-2)'}}>{reactCnt[r.id]}×</div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      </div>

      {expiring.length>0&&(
        <div className="section" style={{marginBottom:28}}>
          <div className="section-title">⏰ Ближайшие сроки</div>
          <div className="card">
            {expiring.map(p=>(
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--bg)'}}>
                <span style={{fontSize:26}}>{typeIcon(p.type)}</span>
                <div style={{flex:1,minWidth:0}}><div style={{fontSize:13,fontWeight:600}}>{p.name}</div>{p.brand&&<div style={{fontSize:11,color:'var(--text-3)'}}>{p.brand}</div>}</div>
                <div className={`badge badge-${expiryStatus(p.daysLeft)}`}>{p.daysLeft<0?'Истёк':`${p.daysLeft} дн.`}</div>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Корреляции */}
      {(() => {
        const corr = computeCorrelations(products, logs);
        if (corr.length===0) return null;
        return (
          <div className="section" style={{marginTop:18}}>
            <div className="section-title" style={{marginBottom:4}}>🔗 Корреляции средств с кожей</div>
            <div style={{fontSize:12,color:'var(--text-3)',marginBottom:12}}>Как кожа реагирует на следующий день после применения</div>
            <div className="card" style={{padding:0,overflow:'hidden'}}>
              {corr.slice(0,8).map((r,i)=>{
                const pct = Math.round(r.improvements/(r.improvements+r.negatives+0.001)*100);
                const color = r.avgDelta>0.1?'var(--ok)':r.avgDelta<-0.1?'var(--danger)':'var(--text-3)';
                const bg = r.avgDelta>0.1?'var(--ok-lt)':r.avgDelta<-0.1?'var(--danger-lt)':'var(--bg)';
                return (
                  <div key={r.product.id} style={{
                    display:'flex',alignItems:'center',gap:10,padding:'12px 16px',
                    borderBottom:i<Math.min(corr.length,8)-1?'1px solid var(--bg)':'none'
                  }}>
                    <span style={{fontSize:22,flexShrink:0}}>{typeIcon(r.product.type)}</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:600,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.product.name}</div>
                      <div style={{fontSize:11,color:'var(--text-3)',marginTop:2}}>{r.uses} использований · {r.cnt} сравнений</div>
                    </div>
                    <div style={{textAlign:'right',flexShrink:0}}>
                      <div style={{fontSize:14,fontWeight:800,color,background:bg,padding:'3px 8px',borderRadius:8}}>
                        {r.avgDelta>0?'+':''}{r.avgDelta.toFixed(2)}
                      </div>
                      <div style={{fontSize:10,color:'var(--text-3)',marginTop:2}}>{pct}% улучшений</div>
                    </div>
                  </div>
                );
              })}
            </div>
            <div style={{fontSize:11,color:'var(--text-3)',marginTop:8,textAlign:'center'}}>Значение показывает среднее изменение рейтинга кожи на следующий день</div>
          </div>
        );
      })()}

      {/* Экспорт */}
      {Object.keys(logs).length>0 && (
        <div className="section" style={{marginTop:20,marginBottom:28}}>
          <div className="section-title" style={{marginBottom:10}}>📤 Экспорт дневника</div>
          <button
            onClick={()=>exportDiaryCSV(logs,products)}
            style={{width:'100%',padding:'13px 20px',borderRadius:14,background:'var(--surface)',border:'1px solid var(--border)',fontSize:14,fontWeight:600,color:'var(--text)',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',gap:10,boxShadow:'var(--shadow)'}}>
            📥 Скачать CSV
            <span style={{fontSize:11,color:'var(--text-3)',fontWeight:400}}>({Object.keys(logs).length} записей)</span>
          </button>
        </div>
      )}

      {Object.keys(logs).length===0&&top5.length===0&&(
        <div className="empty"><div className="empty-icon">📊</div><div className="empty-title">Пока нет данных</div><div className="empty-text">Начни вести ежедневный трекер — и здесь появится статистика</div></div>
      )}
    </div>
  );
}

  bp:      { retinol:0, vitc:0, aha:1, bha:1, niacin:2, pept:0, hyal:2, cer:2, azel:2, bp:2, cu:0, spf:2 },
  cu:      { retinol:0, vitc:0, aha:0, bha:0, niacin:2, pept:1, hyal:2, cer:2, azel:1, bp:0, cu:2, spf:2 },
  spf:     { retinol:2, vitc:3, aha:3, bha:3, niacin:2, pept:2, hyal:2, cer:2, azel:2, bp:2, cu:2, spf:2 },
};
const COMPAT_LEGEND = {
  0: {sym:'✕', color:'var(--danger)',  bg:'var(--danger-lt)',  text:'не сочетать'},
  1: {sym:'~', color:'var(--warn)',    bg:'var(--warn-lt)',    text:'с осторожностью / разделить'},
  2: {sym:'✓', color:'var(--ok)',      bg:'var(--ok-lt)',      text:'хорошо сочетается'},
  3: {sym:'★', color:'var(--primary)', bg:'var(--primary-lt)', text:'усиливают друг друга'},
};
function ActiveCompatibilityMatrix() {

  return (
    <div className="section" style={{marginBottom:28}}>

function AdviceScreen({ products }) {
  const [advTab, setAdvTab] = useState('concerns');
  const [selected, setSelected] = useState([]);
  const cosmetics = products.filter(p=>p.category==='current' && !PRODUCT_TYPES.find(t=>t.id===p.type)?.isGadget);

  function toggleConcern(id) {
    setSelected(prev=>prev.includes(id)?prev.filter(x=>x!==id):[...prev,id]);
  }

  // Для каждой выбранной проблемы — найти подходящие средства
  const recommendations = selected.map(cid => {
    const concern = SKIN_CONCERNS.find(c=>c.id===cid);
    const matched = [];
    for (const p of cosmetics) {
      const ing = (p.ingredients||'').toLowerCase();
      if (!ing) continue;
      const found = INGREDIENT_ACTIONS.filter(a=>
        a.concerns.includes(cid) && ing.includes(a.key)
      );
      if (found.length>0) matched.push({ product:p, found });
    }
    matched.sort((a,b)=>b.found.length-a.found.length);
    return { concern, matched };
  });

  const noIngredients = cosmetics.filter(p=>!(p.ingredients||'').trim()).length;

  // Совместимость — все конфликты и синергии в текущих продуктах
