function PlanScreen({ products }) {
  const [tab, setTab] = useState('template'); // 'template' | 'auto' | 'course'
  const [course, setCourse] = useStorage('lume_plan_course', '');
  const [checked, setChecked] = useStorage('lume_plan_checked', {});

  const cosmetics = products.filter(p=>p.category==='current' && !PRODUCT_TYPES.find(t=>t.id===p.type)?.isGadget);
  const stepOf = id => PRODUCT_TYPES.find(t=>t.id===id)?.step ?? 99;

  // Авто-план: формируем порядок утро/вечер из пользовательских средств
  function buildAutoPlan() {
    const sorted = [...cosmetics].sort((a,b)=>stepOf(a.type)-stepOf(b.type));
    const morning = [], evening = [];
    for (const p of sorted) {
      const t = p.type;
      // Не для утра: пилинги, ретиноиды, ампулы с кислотами/ретинолом
      const ing = (p.ingredients||'').toLowerCase();
      const isRetinol = /retin|tretin/i.test(ing);
      const isAcid    = /(glycolic|lactic|mandelic|salicylic|aha|bha|ahabha)/i.test(ing);
      const isOil     = t==='oil';
      const isSPF     = t==='spf';
      if (isSPF) { morning.push({...p, hint:'обязательно'}); continue; }
      if (isRetinol)  { evening.push({...p, hint:'только вечер'}); continue; }
      if (isAcid && t!=='cleanser') { evening.push({...p, hint:'или чередовать дни'}); continue; }
      if (t==='exfoliant') { evening.push({...p, hint:'2-3 раза в неделю'}); continue; }
      if (isOil) { evening.push({...p, hint:'последним слоем'}); continue; }
      if (t==='mask' || t==='patches') { evening.push({...p, hint:'1-2 раза в неделю'}); continue; }
      // Базовые этапы — и утром, и вечером
      morning.push(p); evening.push(p);
    }
    return { morning, evening };
  }
  const auto = buildAutoPlan();

  // Шаблон утро/вечер: единый канон CARE_STEPS, отфильтрованный по времени суток
  const templateMorning = CARE_STEPS.filter(s=>s.when==='morning'||s.when==='both').map(s=>({step:s.n, name:s.label, sub:s.sub, icon:s.icon}));
  const templateEvening = CARE_STEPS.filter(s=>s.when==='evening'||s.when==='both').map(s=>({step:s.n, name:s.label, sub:s.sub, icon:s.icon}));

  function key(period, idx) { return `${course||'_'}_${period}_${idx}`; }
  function tabBtn(id, label) {
    return (
      <button onClick={()=>setTab(id)} style={{
        flex:1, padding:'9px 6px', borderRadius:9, fontSize:13, fontWeight:700, cursor:'pointer', border:'none',
        background: tab===id ? 'var(--primary)' : 'transparent',
        color: tab===id ? '#fff' : 'var(--text-3)',
      }}>{label}</button>
    );
  }
  const ChecklistRow = ({k, name, sub, hint, photo, icon, step}) => {
    const isOn = !!checked[k];
    return (
      <div className="check-item" style={{cursor:'pointer'}} onClick={()=>setChecked(prev=>({...prev,[k]:!prev[k]}))}>
        <div className={`check-box${isOn?' on':''}`}>{isOn&&<IcoCheck/>}</div>
        {step && (
          <div style={{
            width:22,height:22,borderRadius:6,background:'var(--primary-lt)',color:'var(--primary-dk)',
            fontSize:11,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0
          }} title={`Этап ${step}`}>{step}</div>
        )}
        {(photo||icon) && (
          <div style={{width:32,height:32,borderRadius:8,background:'var(--bg)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,overflow:'hidden'}}>
            {photo
              ? <img src={photo} alt="" style={{width:'100%',height:'100%',objectFit:'cover'}}/>
              : <span style={{fontSize:18}}>{icon}</span>}
          </div>
        )}
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:14,fontWeight:600,textDecoration:isOn?'line-through':'none',color:isOn?'var(--text-3)':'var(--text)'}}>{name}</div>
          {sub && <div style={{fontSize:11,color:'var(--text-3)',marginTop:1}}>{sub}</div>}
          {hint && <div style={{fontSize:10,color:'var(--primary)',marginTop:2,fontWeight:600}}>· {hint}</div>}
        </div>
      </div>
    );
  };

  return (
    <div className="screen">
      <div className="page-header">
        <div className="page-title">План по уходу 🗓️</div>
        <div className="page-sub">Шаблон, авто-план из твоих средств и курсы под цель</div>
      </div>

      <div className="section" style={{paddingBottom:0}}>
        <div style={{display:'flex',background:'var(--bg)',borderRadius:12,padding:3,gap:2}}>
          {tabBtn('template','📋 Шаблон')}
          {tabBtn('auto','✨ Авто-план')}
          {tabBtn('course','🎯 Курс')}
        </div>
      </div>

      {tab==='template' && (
        <>
          <div className="section">
            <div className="routine-card">
              <div style={{fontSize:16,fontWeight:700,marginBottom:10}}>☀️ Утро · {templateMorning.length} шагов</div>
              {templateMorning.map((s,i)=>(
                <ChecklistRow key={'tm'+s.step} k={`tm_${s.step}`} step={s.step} icon={s.icon} name={s.name} sub={s.sub}/>
              ))}
            </div>
          </div>
          <div className="section">
            <div className="routine-card">
              <div style={{fontSize:16,fontWeight:700,marginBottom:10}}>🌙 Вечер · {templateEvening.length} шагов</div>
              {templateEvening.map((s,i)=>(
                <ChecklistRow key={'te'+s.step} k={`te_${s.step}`} step={s.step} icon={s.icon} name={s.name} sub={s.sub}/>
              ))}
            </div>
          </div>
          <div className="section" style={{marginBottom:20}}>
            <div className="card" style={{background:'var(--primary-lt)',padding:'12px 14px',fontSize:12,color:'var(--text-2)',lineHeight:1.5}}>
              💡 Это <b>универсальный канон 12 этапов</b> (тот же, что в Базе и Советах). Не все нужны каждый день — пилинг 2-3 раза в неделю, маска 1-3 раза. Для индивидуального плана из твоих средств — открой вкладку <b>Авто-план</b>.
            </div>
          </div>
        </>
      )}

      {tab==='auto' && (
        <>
          {cosmetics.length===0 ? (
            <div className="empty"><div className="empty-icon">🗓️</div><div className="empty-title">Нет средств</div><div className="empty-text">Добавь средства в базу — соберу план автоматически</div></div>
          ) : (
            <>
              <div className="section">
                <div className="routine-card">
                  <div style={{fontSize:16,fontWeight:700,marginBottom:10}}>☀️ Утро · {auto.morning.length}</div>
                  {auto.morning.map((p,i)=>{
                    const sn = stepNumOf(p.type);
                    return <ChecklistRow key={'am'+p.id} k={`am_${p.id}`} step={sn&&sn<=12?sn:null} photo={p.photo} icon={typeIcon(p.type)} name={p.name} sub={p.brand} hint={p.hint}/>;
                  })}
                </div>
              </div>
              <div className="section">
                <div className="routine-card">
                  <div style={{fontSize:16,fontWeight:700,marginBottom:10}}>🌙 Вечер · {auto.evening.length}</div>
                  {auto.evening.map((p,i)=>{
                    const sn = stepNumOf(p.type);
                    return <ChecklistRow key={'ae'+p.id} k={`ae_${p.id}`} step={sn&&sn<=12?sn:null} photo={p.photo} icon={typeIcon(p.type)} name={p.name} sub={p.brand} hint={p.hint}/>;
                  })}
                </div>
              </div>
              <div className="section" style={{marginBottom:20}}>
                <div className="card" style={{background:'var(--ok-lt)',padding:'12px 14px',fontSize:12,color:'var(--text-2)',lineHeight:1.5}}>
                  ✨ План построен по этапам ухода. Ретинол/кислоты — только в вечер. Активы могут чередоваться по дням.
                </div>
              </div>
            </>
          )}
        </>
      )}

      {tab==='course' && (
        <>
          <div className="section">
            <div className="section-title" style={{marginBottom:10}}>Выбери цель курса</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
              {Object.entries(GOAL_COURSES).map(([id,g])=>(
                <button key={id} onClick={()=>setCourse(course===id?'':id)}
                  style={{
                    padding:'9px 14px',borderRadius:20,fontSize:13,fontWeight:600,cursor:'pointer',border:'none',
                    background: course===id ? 'var(--primary)' : 'var(--surface)',
                    color: course===id ? '#fff' : 'var(--text-2)',
                    boxShadow:'0 1px 4px rgba(0,0,0,.08)',
                  }}>
                  {g.icon} {g.label}
                </button>
              ))}
            </div>
          </div>
          {course && GOAL_COURSES[course] && (
            <>
              {GOAL_COURSES[course].weeks.map(w=>(
                <div key={w.n} className="section">
                  <div className="routine-card">
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                      <div style={{fontSize:15,fontWeight:700}}>Неделя {w.n}</div>
                      <div style={{fontSize:11,color:'var(--primary)',background:'var(--primary-lt)',padding:'3px 9px',borderRadius:10,fontWeight:700}}>{w.focus}</div>
                    </div>
                    {w.tasks.map((t,i)=>(
                      <ChecklistRow key={`w${w.n}_${i}`} k={`w${w.n}_${i}`} name={t}/>
                    ))}
                  </div>
                </div>
              ))}
              <div className="section" style={{marginBottom:20}}>
                <div className="card" style={{background:'var(--warn-lt)',padding:'12px 14px',fontSize:12,color:'var(--text-2)',lineHeight:1.5}}>
                  ⚠️ Это общий протокол. При раздражении, сильной сухости или отсутствии результата за 4–6 недель — корректируй с косметологом.
                </div>
              </div>
            </>
          )}
          {!course && <div className="empty" style={{paddingTop:30}}><div className="empty-icon">👆</div><div className="empty-title">Выбери цель</div><div className="empty-text">Под каждую цель — 4-недельный курс с пошаговым вводом активов</div></div>}
        </>
      )}
    </div>
  );
}

// =============================================
// APP ROOT
// =============================================
function App() {
  const [screen,    setScreen]   = useState('home');
  const [products,  setProducts] = useStorage('lume_v1_products',[]);
  const [logs,      setLogs]     = useStorage('lume_v1_logs',    {});
  const [showSync,  setShowSync] = useState(false);
  const isDesktop                = useIsDesktop();
  const expStatus                = checkExpiry();

  if (expStatus === 'expired') {
    return (
      <div style={{minHeight:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'#F1F4EE',padding:32,textAlign:'center'}}>
        <div style={{fontSize:48,marginBottom:16}}>🔒</div>
        <div style={{fontSize:22,fontWeight:800,color:'#6B9080',marginBottom:8}}>Тестовый период завершён</div>
        <div style={{fontSize:15,color:'#888',marginBottom:4}}>Доступ для <b>{TESTER_NAME}</b> истёк {EXPIRY_DATE}</div>
        <div style={{fontSize:13,color:'#aaa',marginTop:12}}>Свяжись с разработчиком для продления доступа</div>
      </div>
    );
  }

  return (
    <div id="app">
      <StorageWarning/>
      {TESTER_NAME && (
        <div style={{position:'fixed',bottom:70,right:12,zIndex:9000,background:'rgba(196,112,90,0.12)',border:'1px solid rgba(196,112,90,0.3)',borderRadius:8,padding:'4px 10px',fontSize:11,color:'#C4705A',pointerEvents:'none'}}>
          🧪 Тест: {TESTER_NAME}{expStatus==='soon'?' · скоро истекает':''}
        </div>
      )}
      <Nav screen={screen} setScreen={setScreen} isDesktop={isDesktop} products={products} logs={logs} onSync={()=>setShowSync(true)}/>
      {screen==='home'      && <HomeScreen      products={products} setProducts={setProducts} logs={logs} setScreen={setScreen} setLogs={setLogs} isDesktop={isDesktop}/>}
      {screen==='products'  && <ProductsScreen  products={products} setProducts={setProducts}/>}
      {screen==='tracker'   && <TrackerScreen   products={products} logs={logs} setLogs={setLogs} isDesktop={isDesktop}/>}
      {screen==='plan'      && <PlanScreen      products={products}/>}
      {screen==='advice'    && <AdviceScreen    products={products}/>}
      {screen==='analytics' && <AnalyticsScreen products={products} logs={logs} isDesktop={isDesktop}/>}
      {showSync && <SyncSheet products={products} setProducts={setProducts} logs={logs} setLogs={setLogs} onClose={()=>setShowSync(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
